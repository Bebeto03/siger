<aside
    class="flex flex-col shrink-0 transition-all duration-250 sticky top-0 h-screen overflow-y-auto"
    [style.width]="collapsed() ? '64px' : '240px'"
    style="background: var(--color-surface); border-right: 1px solid var(--color-border);"
>
    <!-- Logo -->
    <div class="flex items-center gap-3 cursor-pointer p-4 border-b"
        style="border-color: var(--color-border);"
        (click)="toggleCollapse.emit()">
    <div class="w-9 h-9 rounded-xl flex items-center justify-center font-black text-white text-base shrink-0"
            style="background: linear-gradient(135deg, #06B6D4, #0891B2);">S</div>
    @if (!collapsed()) {
        <div>
        <div class="font-bold text-base tracking-wider" style="color: var(--color-text-primary);">SIGER</div>
        <div class="text-[10px]" style="color: var(--color-text-muted);">Gerenciamento de Reuniões</div>
        </div>
    }
    </div>

    <!-- Nav -->
    <nav class="flex-1 flex flex-col gap-0.5 p-2 py-3">
    @for (item of navItems; track item.id) {
        @if (!item.adminOnly || auth.temPermissao('ROLE_ADMIN')) {
        <button
            (click)="navigate(item.route)"
            class="flex items-center gap-3 rounded-lg border-none cursor-pointer transition-all duration-150 text-sm"
            [style.padding]="collapsed() ? '11px 0' : '11px 14px'"
            [style.justifyContent]="collapsed() ? 'center' : 'flex-start'"
            [style.background]="isActive(item.route) ? 'var(--color-primary-glow)' : 'transparent'"
            [style.color]="isActive(item.route) ? 'var(--color-primary)' : 'var(--color-text-secondary)'"
            [style.fontWeight]="isActive(item.route) ? '600' : '400'"
            (mouseenter)="onHover($event, item.route, true)"
            (mouseleave)="onHover($event, item.route, false)"
        >
            <span class="text-lg leading-none shrink-0">{{ item.icon }}</span>
            @if (!collapsed()) { <span>{{ item.label }}</span> }
        </button>
        }
    }
    </nav>

    <!-- User -->
    <div class="flex items-center gap-2.5 p-4 border-t"
        style="border-color: var(--color-border);"
        [style.justifyContent]="collapsed() ? 'center' : 'flex-start'">
    <div class="w-9 h-9 rounded-full flex items-center justify-center font-bold text-sm text-white shrink-0"
            style="background: linear-gradient(135deg, #6366F1, #8B5CF6);">
        {{ initials() }}
    </div>
    @if (!collapsed()) {
        <div class="flex-1 min-w-0">
        <div class="text-sm font-semibold truncate" style="color: var(--color-text-primary);">{{ auth.getNomeUsuario() }}</div>
        <div class="text-xs mt-0.5" style="color: var(--color-text-muted);">{{ roleLabel() }}</div>
        </div>
    }
    </div>
</aside>
